<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore public school wellbeing scores, identify resource gaps, and discover community health data across the United States.">
  <meta name="theme-color" content="#2E86AB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WellNest">

  <title>WellNest — School Wellbeing Explorer</title>

  <link rel="manifest" href="/pwa/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/pwa/icons/icon-96x96.png">
  <link rel="apple-touch-icon" href="/pwa/icons/icon-192x192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <!-- App styles -->
  <link rel="stylesheet" href="/pwa/css/styles.css">
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay" aria-live="polite" aria-label="Loading">
    <div class="spinner"></div>
    <p class="loading-text">Loading WellNest&hellip;</p>
  </div>

  <!-- Offline banner -->
  <div id="offline-banner" class="offline-banner" role="alert" hidden>
    You're offline. Some features may be limited.
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <a href="/" class="logo" aria-label="WellNest home">
        <svg class="logo-icon" viewBox="0 0 32 32" width="32" height="32" aria-hidden="true">
          <circle cx="16" cy="16" r="14" fill="#2E86AB" opacity="0.15"/>
          <path d="M16 6 C12 6, 8 10, 8 14 C8 20, 16 26, 16 26 C16 26, 24 20, 24 14 C24 10, 20 6, 16 6Z"
                fill="#2E86AB" stroke="#2E86AB" stroke-width="1"/>
          <circle cx="16" cy="14" r="3" fill="#F5F7FA"/>
        </svg>
        <span class="logo-text">WellNest</span>
      </a>

      <nav class="header-nav" aria-label="Main navigation">
        <button id="btn-install" class="btn btn-accent btn-sm" hidden aria-label="Install WellNest app">
          Install App
        </button>
      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main class="app-main">
    <!-- Search panel -->
    <section class="search-section" aria-label="School search">
      <div class="search-container">
        <div class="search-input-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
            <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Search schools by name, city, or ZIP&hellip;"
            autocomplete="off"
            aria-label="Search schools"
            aria-controls="search-results"
            aria-expanded="false"
            role="combobox"
          >
          <button id="search-clear" class="search-clear" aria-label="Clear search" hidden>&times;</button>
        </div>

        <ul id="search-results" class="search-results" role="listbox" hidden></ul>
      </div>

      <!-- Filters row -->
      <div class="filters-row">
        <select id="filter-state" class="filter-select" aria-label="Filter by state">
          <option value="">All States</option>
        </select>
        <select id="filter-score" class="filter-select" aria-label="Filter by score category">
          <option value="">All Scores</option>
          <option value="critical">Critical (0–25)</option>
          <option value="at-risk">At Risk (26–50)</option>
          <option value="moderate">Moderate (51–75)</option>
          <option value="thriving">Thriving (76–100)</option>
        </select>
        <button id="btn-locate" class="btn btn-outline btn-sm" aria-label="Find schools near me">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Near Me
        </button>
      </div>
    </section>

    <!-- Map -->
    <section class="map-section" aria-label="School map">
      <div id="map" class="map-container" role="application" aria-label="Interactive school map"></div>
    </section>

    <!-- School detail panel -->
    <aside id="school-panel" class="school-panel" aria-label="School details" hidden>
      <div class="panel-header">
        <button id="panel-close" class="panel-close" aria-label="Close panel">&times;</button>
        <h2 id="panel-school-name" class="panel-title"></h2>
        <p id="panel-school-location" class="panel-subtitle"></p>
      </div>

      <div class="panel-body">
        <!-- Overall score gauge -->
        <div class="score-gauge-wrap">
          <div id="score-gauge" class="score-gauge" role="img" aria-label="Overall wellbeing score">
            <svg viewBox="0 0 120 120" class="gauge-svg">
              <circle cx="60" cy="60" r="52" class="gauge-bg"/>
              <circle cx="60" cy="60" r="52" class="gauge-fill" id="gauge-fill"
                      stroke-dasharray="327" stroke-dashoffset="327"/>
            </svg>
            <div class="gauge-label">
              <span id="gauge-value" class="gauge-value">--</span>
              <span class="gauge-caption">Overall</span>
            </div>
          </div>
        </div>

        <!-- Score breakdown cards -->
        <div id="score-cards" class="score-cards"></div>

        <!-- Quick facts -->
        <div id="school-facts" class="school-facts"></div>

        <!-- Ask a question (RAG) -->
        <div class="ask-section">
          <h3 class="ask-heading">Ask about this school</h3>
          <div class="ask-input-wrap">
            <input type="text" id="ask-input" class="ask-input" placeholder="e.g. What resources are lacking?">
            <button id="ask-btn" class="btn btn-primary btn-sm">Ask</button>
          </div>
          <div id="ask-answer" class="ask-answer" hidden></div>
        </div>
      </div>
    </aside>
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <p>&copy; 2026 WellNest &middot; Data sourced from NCES, SDOH, and community health datasets.</p>
  </footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script src="/pwa/js/api.js"></script>
  <script src="/pwa/js/map.js"></script>
  <script src="/pwa/js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/pwa/sw.js')
          .then(reg => console.log('SW registered, scope:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
