default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]          # dbt yaml uses jinja — strict mode chokes on it
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]       # catch accidental parquet commits

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.12
          - types-requests
        args: [--config-file=pyproject.toml]
        pass_filenames: false       # run on the whole project so mypy can resolve imports
